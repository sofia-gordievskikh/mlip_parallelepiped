# демо-задача: тонкая наклонная допустимая область (slab),
# где axis-aligned коробка не влезает по ширине, а параллелепипед - да.
#
# max c·x  s.t.  A x <= b,  l_bounds <= x <= u_bounds,  x[int_idx] целые

c: [1.0, 1.0]

A:
  - [1.0, -1.0]   # x - y <= 1   (верхняя граница полосы)
  - [-1.0, 1.0]   # x - y >= 0   (нижняя граница полосы)
  - [1.0, 1.0]    # x + y <= 10  (ограничение вдоль полосы)

b: [1.0, 0.0, 10.0]

l_bounds: [0.0, 0.0]
u_bounds: [6.0, 6.0]

int_idx: [0]        # x - целочисленная

tau: 1.5            # требуемая ширина области вдоль целочисленной оси

parallelepiped:
  angle_deg: 45     # базис повёрнут под наклон полосы (для 2D)
